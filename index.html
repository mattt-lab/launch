<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Everything I track, live</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<link rel="apple-touch-icon" sizes="500x500" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#0b0b0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Launch">
<meta name="description" content="One place to jump into the dashboards I actually keep open — race weekends, tournaments, and positions.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Launch">
<meta property="og:title" content="Everything I track, live">
<meta property="og:description" content="One place to jump into the dashboards I actually keep open — race weekends, tournaments, and positions.">
<meta property="og:image" content="https://mattt-lab.github.io/launch/apple-touch-icon.png">
<meta property="og:url" content="https://mattt-lab.github.io/launch/">
<meta name="twitter:card" content="summary">
<meta name="twitter:image" content="https://mattt-lab.github.io/launch/apple-touch-icon.png">
<style>
  :root {
    --bg: #0b0b0b;
    --panel: #111111;
    --panel-2: #161616;
    --border: #232323;
    --border-soft: #1a1a1a;
    --text: #f0f0f0;
    --text-dim: #8a8a8a;
    --text-faint: #4a4a4a;
    --mono: ui-monospace, 'Cascadia Code', 'SFMono-Regular', Consolas, 'JetBrains Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    margin: 0;
    min-height: 100%;
  }

  #bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    display: block;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(680px 420px at 12% -6%, rgba(225, 6, 0, 0.10), transparent 60%),
      radial-gradient(620px 380px at 88% 0%, rgba(245, 197, 24, 0.08), transparent 60%),
      radial-gradient(700px 460px at 50% 108%, rgba(34, 197, 94, 0.07), transparent 60%);
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 1080px;
    margin: 0 auto;
    padding: 64px 24px 64px;
  }

  /* ---------- hero ---------- */

  .hero { margin-bottom: 48px; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 14px;
  }
  .eyebrow b { color: var(--text-dim); font-weight: 600; }
  h1 {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0 0 10px;
    text-wrap: balance;
  }
  .hero p {
    font-size: 15px;
    color: var(--text-dim);
    max-width: 52ch;
    line-height: 1.6;
    margin: 0;
  }

  /* ---------- grid ---------- */

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  @media (max-width: 860px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    h1 { font-size: 27px; }
    .page { padding-top: 40px; }
  }

  .tile {
    --accent: #888;
    position: relative;
    grid-column: span 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 18px 16px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: hidden;
    transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
    opacity: 0;
    transform: translateY(10px);
    animation: rise 0.5s ease forwards;
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .tile::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.55;
    transition: opacity 0.18s ease;
  }
  .tile::after {
    content: "";
    position: absolute;
    inset: -40% -20% auto auto;
    width: 220px; height: 220px;
    background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
  }

  .tile:hover, .tile:focus-visible {
    border-color: color-mix(in srgb, var(--accent) 55%, var(--border));
    background: var(--panel-2);
    transform: translateY(-3px);
    outline: none;
  }
  .tile:hover::before, .tile:focus-visible::before { opacity: 1; }
  .tile:hover::after, .tile:focus-visible::after { opacity: 0.10; }

  .tile-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .tile-icon {
    font-size: 20px;
    line-height: 1;
    filter: grayscale(0.15);
  }
  .status {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }
  .status.is-live .status-dot { animation: pulse-dot 1.6s ease-in-out infinite; }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .tile-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.005em;
  }
  .tile-desc {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.5;
    flex: 1;
  }

  .tile-meta {
    display: flex;
    justify-content: flex-end;
    padding-top: 10px;
    border-top: 1px solid var(--border-soft);
  }
  .tile-go {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.03em;
    color: var(--text-dim);
    transition: transform 0.18s ease, color 0.18s ease;
  }
  .tile:hover .tile-go, .tile:focus-visible .tile-go {
    color: var(--accent);
    transform: translateX(3px);
  }

  /* ---------- footer ---------- */

  footer {
    margin-top: 44px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  footer .ok { color: #22c55e; }

  @media (prefers-reduced-motion: reduce) {
    .tile { animation: none; opacity: 1; transform: none; }
    .status-dot { animation: none; }
  }
</style>
</head>
<body>
<canvas id="bg-grid" aria-hidden="true"></canvas>
<div class="page">
  <div class="hero">
    <div class="eyebrow">4 channels &nbsp;·&nbsp; <b>all systems nominal</b></div>
    <h1>Everything I track, live.</h1>
    <p>One place to jump into the dashboards I actually keep open — race weekends, tournaments, and positions.</p>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <span><span class="ok">●</span> 4 apps · static, no backend</span>
    <span id="footer-date"></span>
  </footer>
</div>

<script>
  // ---- animated background grid: same 42px lines as before, each one
  // gets a gentle sine-wave ripple so the panel reads as "live" rather than
  // static. Amplitude is tiny on purpose — texture, not decoration. ----
  (function () {
    const canvas = document.getElementById("bg-grid");
    const ctx = canvas.getContext("2d");
    const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

    const SPACING = 42;   // matches the old CSS grid size
    const STEP = 18;      // sample interval along each line, in CSS px
    const AMP = reduced ? 0 : 5.1;    // ripple height, in CSS px
    const SPEED = 0.0007;              // radians per ms
    const FREQ = 0.01;                // radians per px, along the line
    const DRIFT = 0.012;               // radians per px, across lines (so lines don't ripple in lockstep)

    let w = 0, h = 0, dpr = 1;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function draw(t) {
      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = "#1a1a1a";
      ctx.lineWidth = 1;

      for (let x = 0; x <= w; x += SPACING) {
        ctx.beginPath();
        for (let y = 0; y <= h; y += STEP) {
          const dx = AMP * Math.sin(y * FREQ + t * SPEED + x * DRIFT);
          if (y === 0) ctx.moveTo(x + dx, 0); else ctx.lineTo(x + dx, y);
        }
        ctx.lineTo(x + AMP * Math.sin(h * FREQ + t * SPEED + x * DRIFT), h);
        ctx.stroke();
      }

      for (let y = 0; y <= h; y += SPACING) {
        ctx.beginPath();
        for (let x = 0; x <= w; x += STEP) {
          const dy = AMP * Math.sin(x * FREQ + t * SPEED + y * DRIFT);
          if (x === 0) ctx.moveTo(0, y + dy); else ctx.lineTo(x, y + dy);
        }
        ctx.lineTo(w, y + AMP * Math.sin(w * FREQ + t * SPEED + y * DRIFT));
        ctx.stroke();
      }
    }

    resize();
    window.addEventListener("resize", resize);

    if (reduced) {
      draw(0);
    } else {
      requestAnimationFrame(function loop(t) {
        draw(t);
        requestAnimationFrame(loop);
      });
    }
  })();

  // ---- date helpers (all UTC-based, so status doesn't drift with viewer timezone) ----
  function parseISO(iso) {
    const [y, m, d] = iso.split("-").map(Number);
    return Date.UTC(y, m - 1, d);
  }
  function todayISO() {
    const d = new Date();
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, "0")}-${String(d.getUTCDate()).padStart(2, "0")}`;
  }
  function daysBetween(aIso, bIso) {
    return Math.round((parseISO(bIso) - parseISO(aIso)) / 86400000);
  }
  function addDaysISO(iso, n) {
    const d = new Date(parseISO(iso) + n * 86400000);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, "0")}-${String(d.getUTCDate()).padStart(2, "0")}`;
  }

  // ---- per-app live status ----
  // F1 and World Cup read the same committed JSON their own dashboards use;
  // Tour de France reads its route file. All three are same-origin (mattt-lab.github.io),
  // so no CORS setup is needed. Portfolio Tracker's status is just NYSE market hours,
  // computed locally rather than fetched.

  async function computeF1Status() {
    try {
      const res = await fetch("https://api.jolpi.ca/ergast/f1/current/races.json?limit=100");
      const data = await res.json();
      const races = data.MRData.RaceTable.Races;
      const today = todayISO();
      for (const race of races) {
        const weekendStart = addDaysISO(race.date, -2);
        if (today >= weekendStart && today <= race.date) {
          return { text: "Race week", live: true };
        }
      }
      const next = races.find(r => r.date > today);
      if (next) {
        const days = daysBetween(today, next.date);
        return { text: `${next.raceName.replace(" Grand Prix", " GP")} in ${days}d`, live: false };
      }
      return { text: "Season complete", live: false };
    } catch {
      return { text: "F1 Dashboard", live: false };
    }
  }

  async function computeTdfStatus() {
    try {
      const res = await fetch("https://mattt-lab.github.io/tour-de-france/data/route.json");
      const data = await res.json();
      const stages = data.stages;
      const today = todayISO();
      const stage = stages.find(s => s.date === today);
      if (stage) {
        return stage.type === "rest"
          ? { text: "Rest day", live: false }
          : { text: `Stage ${stage.n}`, live: true };
      }
      if (today < stages[0].date) {
        return { text: `Starts in ${daysBetween(today, stages[0].date)}d`, live: false };
      }
      if (today > stages[stages.length - 1].date) {
        return { text: "Tour complete", live: false };
      }
      return { text: "Between stages", live: false };
    } catch {
      return { text: "Tour de France", live: false };
    }
  }

  const WC_STAGE_LABELS = {
    GROUP_STAGE: "Group Stage", LAST_32: "Round of 32", LAST_16: "Round of 16",
    QUARTER_FINALS: "Quarterfinals", SEMI_FINALS: "Semifinals",
    THIRD_PLACE: "3rd Place Playoff", FINAL: "Final"
  };

  async function computeWcStatus() {
    try {
      const res = await fetch("https://mattt-lab.github.io/world-cup/data/matches.json");
      const matches = (await res.json()).matches;
      const label = m => WC_STAGE_LABELS[m.stage] || m.stage;

      const live = matches.find(m => m.status === "IN_PLAY" || m.status === "PAUSED");
      if (live) return { text: `Live — ${label(live)}`, live: true };

      const today = todayISO();
      const todays = matches.filter(m =>
        m.utcDate.slice(0, 10) === today && (m.status === "SCHEDULED" || m.status === "TIMED"));
      if (todays.length) return { text: `${label(todays[0])} today`, live: false };

      const upcoming = matches
        .filter(m => (m.status === "SCHEDULED" || m.status === "TIMED") && m.utcDate.slice(0, 10) > today)
        .sort((a, b) => a.utcDate.localeCompare(b.utcDate));
      if (upcoming.length) {
        const days = daysBetween(today, upcoming[0].utcDate.slice(0, 10));
        return { text: `${label(upcoming[0])} in ${days}d`, live: false };
      }
      return { text: "Tournament complete", live: false };
    } catch {
      return { text: "World Cup 2026", live: false };
    }
  }

  function computePortfolioStatus() {
    const parts = new Intl.DateTimeFormat("en-US", {
      timeZone: "America/New_York", hour12: false,
      weekday: "short", hour: "2-digit", minute: "2-digit"
    }).formatToParts(new Date());
    const get = t => parts.find(p => p.type === t)?.value;
    const weekday = get("weekday");
    const mins = parseInt(get("hour"), 10) * 60 + parseInt(get("minute"), 10);

    if (weekday === "Sat" || weekday === "Sun") return { text: "Market closed", live: false };
    if (mins >= 570 && mins < 960) return { text: "Market open", live: true };      // 9:30–16:00 ET
    if (mins >= 960 && mins < 1200) return { text: "After hours", live: true };     // 16:00–20:00 ET
    if (mins >= 240 && mins < 570) return { text: "Pre-market", live: false };      // 4:00–9:30 ET
    return { text: "Market closed", live: false };
  }

  const apps = [
    {
      key: "f1", icon: "🏎️", name: "F1 Dashboard", accent: "#e10600",
      desc: "Race weekends, standings, and AI-written race wraps.",
      href: "https://mattt-lab.github.io/f1-dashboard/",
      statusFn: computeF1Status
    },
    {
      key: "tdf", icon: "🚴", name: "Tour de France", accent: "#f5c518",
      desc: "Stage-by-stage storylines and all four jerseys.",
      href: "https://mattt-lab.github.io/tour-de-france/",
      statusFn: computeTdfStatus
    },
    {
      key: "wc", icon: "⚽", name: "World Cup 2026", accent: "#22c55e",
      desc: "Groups, bracket, and what every match means.",
      href: "https://mattt-lab.github.io/world-cup/",
      statusFn: computeWcStatus
    },
    {
      key: "port", icon: "📈", name: "Portfolio Tracker", accent: "#6366f1",
      desc: "Live positions, after-hours moves, AI storylines.",
      href: "https://portfolio-tracker-gilt-eight.vercel.app/",
      statusFn: null // synchronous, resolved immediately below
    }
  ];

  function renderStatus(el, text, live) {
    el.className = "status" + (live ? " is-live" : "");
    el.innerHTML = `<span class="status-dot"></span>${text}`;
  }

  const grid = document.getElementById("grid");
  apps.forEach((a, i) => {
    const tile = document.createElement("a");
    tile.className = "tile";
    tile.href = a.href;
    tile.target = "_blank";
    tile.rel = "noopener";
    tile.style.setProperty("--accent", a.accent);
    tile.style.animationDelay = (i * 0.06) + "s";
    tile.innerHTML = `
      <div class="tile-top">
        <span class="tile-icon">${a.icon}</span>
        <span class="status" id="status-${a.key}"><span class="status-dot"></span>···</span>
      </div>
      <div>
        <div class="tile-name">${a.name}</div>
        <div class="tile-desc">${a.desc}</div>
      </div>
      <div class="tile-meta">
        <span class="tile-go">open →</span>
      </div>
    `;
    grid.appendChild(tile);

    const statusEl = tile.querySelector(`#status-${a.key}`);
    if (a.statusFn) {
      a.statusFn().then(({ text, live }) => renderStatus(statusEl, text, live));
    } else {
      const { text, live } = computePortfolioStatus();
      renderStatus(statusEl, text, live);
    }
  });

  document.getElementById("footer-date").textContent =
    new Date().toLocaleDateString([], { weekday: "long", month: "long", day: "numeric", year: "numeric" });
</script>
</body>
</html>
